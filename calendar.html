<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>달력</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calendar.css">
</head>
<body>

  <!-- ══════════════ LOADING ══════════════ -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <div style="font-size:12px;color:var(--text3)">로딩 중...</div>
  </div>

  <!-- ══════════════ AUTH PAGE ══════════════ -->
  <div id="authPage">
    <div class="auth-card">
      <div class="auth-logo">Wiki<span>Mind</span></div>
      <div class="auth-subtitle">계속하려면 로그인하세요</div>
      <span id="authTitle"></span>

      <!-- 소셜 로그인 -->
      <div class="auth-social" id="authSocial">
        <button class="social-btn" onclick="handleSocialLogin(googleProvider)">
          <span class="si" style="font-weight:700;color:#4285F4">G</span>
          Google로 계속하기
        </button>
        <button class="social-btn" onclick="handleSocialLogin(githubProvider)">
          <span class="si">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </span>
          GitHub로 계속하기
        </button>
      </div>

      <!-- 구분선 -->
      <div class="auth-divider" id="authDivider"><span>또는 이메일로</span></div>

      <!-- 이름 (회원가입만) -->
      <div class="auth-form-group" id="authNameWrap" style="display:none">
        <input class="auth-input" id="authName" type="text" placeholder="이름">
      </div>

      <!-- 이메일 -->
      <div class="auth-form-group">
        <input class="auth-input" id="authEmail" type="email" placeholder="이메일"
          onkeydown="if(event.key==='Enter')document.getElementById('authSubmitBtn').click()">
      </div>

      <!-- 비밀번호 -->
      <div class="auth-form-group" id="authPasswordWrap">
        <input class="auth-input" id="authPassword" type="password" placeholder="비밀번호"
          onkeydown="if(event.key==='Enter')document.getElementById('authSubmitBtn').click()">
      </div>

      <!-- 메시지 -->
      <div id="authError" class="auth-msg"></div>

      <!-- 제출 -->
      <button class="auth-submit" id="authSubmitBtn">로그인</button>

      <!-- 하단 링크 -->
      <div id="authFooter">
        <span class="auth-link" onclick="setAuthMode('signup')">회원가입</span>
        <span class="auth-link" onclick="setAuthMode('reset')">비밀번호 찾기</span>
      </div>
    </div>
  </div>

  <!-- ══════════════ VERIFY PAGE ══════════════ -->
  <div id="verifyPage">
    <div class="verify-card">
      <span class="verify-icon">📬</span>
      <div class="verify-title">이메일을 확인해주세요</div>
      <p class="verify-desc">아래 주소로 인증 메일을 보냈습니다.</p>
      <span class="verify-email" id="verifyEmail"></span>
      <p class="verify-hint">
        메일함에서 <strong style="color:var(--text)">WikiMind 인증 링크</strong>를 클릭하면<br>
        자동으로 앱이 열립니다. 스팸 폴더도 확인해보세요.
      </p>
      <div class="verify-actions">
        <button id="resendBtn" onclick="handleResendVerification()">인증 메일 재발송</button>
        <button class="verify-signout" onclick="handleVerifySignOut()">다른 계정으로 로그인</button>
      </div>
      <div class="verify-polling">
        <span class="polling-dot"></span>
        <span class="polling-dot"></span>
        <span class="polling-dot"></span>
        인증 완료 확인 중...
      </div>
    </div>
  </div>

  <!-- ══════════════ APP PAGE ══════════════ -->
  <div id="appPage" style="display:none">
    <div id="app">
      <div class="hdr">
        <div class="hdr-title" id="hdrTitle"></div>
        <div class="navrow">
          <button class="nbtn ico" id="btnPrev">&#8592;</button>
          <button class="nbtn" id="btnToday" style="letter-spacing:.06em;font-size:.72rem;text-transform:uppercase">오늘</button>
          <button class="nbtn ico" id="btnNext">&#8594;</button>
        </div>
        <div class="vtabs">
          <button class="vtab" data-v="year">연간</button>
          <button class="vtab on" data-v="month">월간</button>
          <button class="vtab" data-v="day">일간</button>
        </div>
        <div class="user-menu" id="userMenu">
          <button class="user-avatar" id="userAvatar" onclick="toggleUserMenu()"></button>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-info">
              <div class="user-name" id="userDisplayName"></div>
              <div class="user-email" id="userDisplayEmail"></div>
            </div>
            <div class="user-dropdown-divider"></div>
            <button class="user-dropdown-item" onclick="handleSignOut()">로그아웃</button>
          </div>
        </div>
      </div>
      <div class="vwrap" id="vwrap"></div>
    </div>
  </div>
  <div class="dragbadge" id="dragBadge"></div>

  <!-- FORM MODAL -->
  <div class="overlay" id="fmModal">
    <div class="modal">
      <div class="mhd">
        <div>
          <div class="mttl" id="fmTtl">일정 추가</div>
          <div class="msub" id="fmSub"></div>
        </div>
        <button class="mclose" onclick="closeM('fmModal')">✕</button>
      </div>
      <div class="fg">
        <label class="flbl">제목</label>
        <input class="finp" id="fmTitle" placeholder="일정 제목" maxlength="40">
      </div>
      <div class="fg" id="fmDateFg">
        <label class="flbl">날짜</label>
        <div class="tworow">
          <input class="finp" id="fmS" type="date">
          <input class="finp" id="fmE" type="date">
        </div>
      </div>
      <div class="fg" id="fmTimeFg" style="display:none">
        <label class="flbl">시간</label>
        <div class="tworow">
          <input class="finp" id="fmST" type="time">
          <input class="finp" id="fmET" type="time">
        </div>
      </div>
      <div class="fg">
        <label class="flbl">메모</label>
        <textarea class="ftxt" id="fmMemo" placeholder="메모 (선택)"></textarea>
      </div>
      <div class="fg">
        <label class="flbl">색상</label>
        <div class="cp" id="fmCp">
          <div class="co gold on" data-c="gold" onclick="pickC(this)">✓</div>
          <div class="co blue" data-c="blue" onclick="pickC(this)"></div>
          <div class="co red" data-c="red" onclick="pickC(this)"></div>
          <div class="co green" data-c="green" onclick="pickC(this)"></div>
          <div class="co purple" data-c="purple" onclick="pickC(this)"></div>
        </div>
      </div>
      <div class="mact">
        <button class="btn btn-g" onclick="closeM('fmModal')">취소</button>
        <button class="btn btn-p" id="fmSavBtn" onclick="saveForm()">저장</button>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="overlay" id="detModal">
    <div class="modal">
      <div class="mhd">
        <div class="detrow">
          <div class="detbar" id="detBar"></div>
          <div class="detbody">
            <div class="det-ttl" id="detTtl"></div>
            <div class="det-dt" id="detDt"></div>
            <div class="det-memo" id="detMemo"></div>
          </div>
        </div>
        <button class="mclose" onclick="closeM('detModal')">✕</button>
      </div>
      <div class="mact" style="margin-top:20px">
        <button class="btn btn-d" onclick="doDelete()">삭제</button>
        <button class="btn btn-g" onclick="doEdit()">수정</button>
        <button class="btn btn-p" onclick="closeM('detModal')">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="calendar.js"></script>
</body>
</html>
